<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="login-box">
        <h2>Regitro</h2>
        <form>
            <div class="user-box">
                <input type="text" name="" id="txtNombre">
                <label>Nombre</label>
            </div>
            <div class="user-box">
                <input type="text" name="" id="numTelefono">
                <label>Teléfono</label>
            </div>
            <div class="user-box">
                <input type="number" name="" id="numEdad">
                <label>Edad</label>
            </div>
            <div class="user-box">
                <input type="email" name="" id="txtEmail">
                <label>Email</label>
            </div>
            <div class="user-box">
                <input type="password" name="" id="txtPass1">
                <label>Password</label>
            </div>
            <div class="user-box">
                <input type="password" name="" id="txtPass2">
                <label>Confirmar password</label>
            </div>
            <button type="submit" id="btnRegister">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                Submit
            </button>
            <div id="alert">Error</div>
            <div id="alertSuccess">Datos correctos</div>
        </form>
      </div>
      <script src="./js/validacionregister.js"></script>
</body>
</html>
